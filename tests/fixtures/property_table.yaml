schema_version: 2
document_type: dataset
backend:
  name: coolprop
  model: heos
mode: property_table
fluids: [Propane]
grid:
  temperature:
    kind: explicit
    values: [300.0]
    unit: K
  pressure:
    kind: explicit
    values: [1.0, 5.0]
    unit: bar
properties:
  - specific_enthalpy
  - mass_density
