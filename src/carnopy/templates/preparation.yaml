# Carnopy preparation starter configuration.
#
# Preparation converts an existing immutable dataset run or model-sweep bundle
# into deterministic, unsplit Parquet artifacts for downstream ML/surrogate
# workflows. It never calls thermodynamic backends.

schema_version: 1
document_type: preparation

source_policy:
  allow_partial_sweep: false

features:
  numeric:
    - temperature
    - pressure
    - mass_density
  derived:
    - specific_volume

categorical_features:
  - field: phase
    encoding: one_hot
    categories: observed

targets:
  - specific_enthalpy

auxiliary:
  - fluid
  - backend_model
  - phase
  - run_id
  - case_id

# Optional leakage-aware scenarios. Omit this section to keep the default
# unsplit Stage-5 behavior.
#
# scenarios:
#   - name: shuffle_baseline
#     kind: shuffle
#     seed: 42
#     partitions:
#       train: 0.8
#       validation: 0.1
#       test: 0.1
#     transformations:
#       - field: pressure
#         methods: [log10, standard]
#
#   - name: leave_fluid_out
#     kind: leave_fluid_out
#     holdouts:
#       test: [Isopentane]
#     remainder: train

outputs:
  formats: [parquet]
