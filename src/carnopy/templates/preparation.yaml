# Carnopy preparation starter configuration.
#
# Preparation converts an existing immutable dataset run or model-sweep bundle
# into deterministic Parquet outputs for downstream ML/surrogate workflows.
# Optional array/tensor exports are derived from the Parquet table. Preparation
# never calls thermodynamic backends.
#
# Reference-dependent fields such as specific_enthalpy, specific_entropy, and
# specific_internal_energy are allowed only when selected rows share one
# compatible reference_state_policy/backend/model context. Carnopy records that
# context in the preparation manifest.

schema_version: 1
document_type: preparation

source_policy:
  allow_partial_sweep: false

features:
  numeric:
    - temperature
    - pressure
    - mass_density
  derived:
    - specific_volume

categorical_features:
  - field: phase
    encoding: one_hot
    categories: observed

targets:
  - specific_enthalpy

auxiliary:
  - fluid
  - backend_model
  - phase
  - run_id
  - case_id

# Optional leakage-aware scenarios. Omit this section to keep the default
# unsplit Stage-5 behavior.
#
# scenarios:
#   - name: shuffle_baseline
#     kind: shuffle
#     seed: 42
#     partitions:
#       train: 0.8
#       validation: 0.1
#       test: 0.1
#     transformations:
#       - field: pressure
#         methods: [log10, standard]
#
#   - name: leave_fluid_out
#     kind: leave_fluid_out
#     holdouts:
#       test: [Isopentane]
#     remainder: train

outputs:
  formats: [parquet]
  # Equivalent structured form:
  # parquet: true
  # arrays:
  #   formats: [npy, npz, safetensors]
  #   dtype: float32
  #   include_auxiliary: false
