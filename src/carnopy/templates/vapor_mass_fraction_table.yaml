# Two-phase states driven by vapor mass fraction and one saturation coordinate.
# Vapor mass fraction is dimensionless and must remain between 0 and 1.
# Values 0 and 1 are the saturated-liquid and saturated-vapor boundaries.
# Values strictly between them are equilibrium two-phase mixture states.
# Discover names with: carnopy fluids
# Discover output properties with: carnopy properties
schema_version: 2
document_type: dataset
backend:
  name: coolprop
  model: heos
mode: vapor_mass_fraction_table
fluids:
  - Propane
grid:
  # linspace includes both endpoints.
  temperature:
    kind: linspace
    start: -20.0
    stop: 50.0
    num: 4
    unit: degC
  # explicit preserves order; duplicate values are rejected.
  vapor_mass_fraction:
    kind: explicit
    values: [0.0, 0.25, 0.5, 0.75, 1.0]
    unit: "1"
properties:
  - specific_enthalpy
  - specific_entropy
  - mass_density
outputs:
  # Select one or both. Omission defaults to [csv, parquet].
  dataset_formats: [csv, parquet]
