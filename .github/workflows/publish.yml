name: Publish verified distributions

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality:
    name: Release quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true
      - name: Verify tag and source version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_VERSION="$(python -c \
            'import re; from pathlib import Path; text=Path("src/carnopy/_version.py").read_text(); print(re.search(r"""__version__\s*=\s*"([^"]+)""", text).group(1))')"
          test "$GITHUB_REF_NAME" != "$VERSION"
          test "$VERSION" = "$SOURCE_VERSION"
      - name: Verify lock file
        run: uv lock --check
      - name: Synchronize development dependencies
        run: uv sync --locked --python 3.12 --extra all --group dev
      - name: Run Ruff
        run: uv run --locked ruff check .
      - name: Check formatting
        run: uv run --locked ruff format --check .
      - name: Run strict mypy
        run: uv run --locked mypy src/carnopy
      - name: Run preflight
        run: uv run --locked python scripts/preflight.py

  tests:
    name: Release tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true
      - name: Synchronize test dependencies
        run: >-
          uv sync --locked --python "${{ matrix.python-version }}"
          --extra viz --extra ml --no-default-groups --group test
      - name: Run tests
        run: uv run --locked --no-default-groups --group test pytest

  app:
    name: Release desktop app (Python 3.12)
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true
      - name: Synchronize desktop test dependencies
        run: >-
          uv sync --locked --python 3.12
          --extra app --no-default-groups --group test
      - name: Run desktop tests
        run: >-
          uv run --locked --no-default-groups --group test pytest
          tests/test_app_launcher.py
          tests/test_app_workspace.py
          tests/test_app_window.py
          tests/test_app_worker.py

  build:
    name: Build distributions once
    needs:
      - quality
      - tests
      - app
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true
      - name: Synchronize release dependencies
        run: uv sync --locked --python 3.12 --no-default-groups --group release
      - name: Build wheel and sdist
        run: >-
          uv run --locked --no-default-groups --group release
          python -m build
      - name: Upload candidate distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: candidate-distributions
          path: dist/
          if-no-files-found: error

  inspect:
    name: Inspect and smoke-test distributions
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true
      - name: Synchronize release dependencies
        run: uv sync --locked --python 3.12 --extra all --group dev --group release
      - name: Download candidate distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: candidate-distributions
          path: release/dist
      - name: Verify version, metadata, and package contents
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run --locked --group release python -m twine check release/dist/*
          uv run --locked python scripts/check_distribution.py \
            --expected-version "$VERSION" \
            release/dist/*
      - name: Smoke-test base wheel outside checkout
        shell: bash
        run: |
          WHEEL="$(find "$PWD/release/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          python -m venv "$RUNNER_TEMP/carnopy-base"
          "$RUNNER_TEMP/carnopy-base/bin/python" -m pip install "$WHEEL"
          "$RUNNER_TEMP/carnopy-base/bin/python" -m pip check
          "$RUNNER_TEMP/carnopy-base/bin/python" scripts/smoke_installed.py \
            --work-directory "$RUNNER_TEMP/base-smoke" \
            --expected-version "${GITHUB_REF_NAME#v}"
      - name: Smoke-test wheel with ML extra outside checkout
        shell: bash
        run: |
          WHEEL="$(find "$PWD/release/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          python -m venv "$RUNNER_TEMP/carnopy-ml"
          WHEEL_URI="$("$RUNNER_TEMP/carnopy-ml/bin/python" -c \
            'from pathlib import Path; import sys; print(Path(sys.argv[1]).resolve().as_uri())' \
            "$WHEEL")"
          "$RUNNER_TEMP/carnopy-ml/bin/python" -m pip install \
            --index-url https://pypi.org/simple/ \
            "carnopy[ml] @ ${WHEEL_URI}"
          "$RUNNER_TEMP/carnopy-ml/bin/python" -m pip check
          "$RUNNER_TEMP/carnopy-ml/bin/python" scripts/smoke_installed.py \
            --work-directory "$RUNNER_TEMP/ml-smoke" \
            --expected-version "${GITHUB_REF_NAME#v}" \
            --with-ml-exports
      - name: Smoke-test wheel with app extra outside checkout
        shell: bash
        run: |
          WHEEL="$(find "$PWD/release/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          python -m venv "$RUNNER_TEMP/carnopy-app"
          WHEEL_URI="$("$RUNNER_TEMP/carnopy-app/bin/python" -c \
            'from pathlib import Path; import sys; print(Path(sys.argv[1]).resolve().as_uri())' \
            "$WHEEL")"
          "$RUNNER_TEMP/carnopy-app/bin/python" -m pip install \
            --index-url https://pypi.org/simple/ \
            "carnopy[app] @ ${WHEEL_URI}"
          "$RUNNER_TEMP/carnopy-app/bin/python" -m pip check
          QT_QPA_PLATFORM=offscreen \
          "$RUNNER_TEMP/carnopy-app/bin/python" scripts/smoke_installed.py \
            --work-directory "$RUNNER_TEMP/app-smoke" \
            --expected-version "${GITHUB_REF_NAME#v}" \
            --with-visualization \
            --with-app
      - name: Smoke-test wheel with all extras outside checkout
        shell: bash
        run: |
          WHEEL="$(find "$PWD/release/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          python -m venv "$RUNNER_TEMP/carnopy-all"
          WHEEL_URI="$("$RUNNER_TEMP/carnopy-all/bin/python" -c \
            'from pathlib import Path; import sys; print(Path(sys.argv[1]).resolve().as_uri())' \
            "$WHEEL")"
          "$RUNNER_TEMP/carnopy-all/bin/python" -m pip install \
            --index-url https://pypi.org/simple/ \
            "carnopy[all] @ ${WHEEL_URI}"
          "$RUNNER_TEMP/carnopy-all/bin/python" -m pip check
          "$RUNNER_TEMP/carnopy-all/bin/python" scripts/smoke_installed.py \
            --work-directory "$RUNNER_TEMP/all-smoke" \
            --expected-version "${GITHUB_REF_NAME#v}" \
            --with-visualization \
            --with-ml-exports \
            --with-app
      - name: Smoke-test sdist and reconstruct wheel outside checkout
        shell: bash
        run: |
          SDIST="$(find "$PWD/release/dist" -maxdepth 1 -name '*.tar.gz' -print -quit)"
          python -m venv "$RUNNER_TEMP/carnopy-sdist"
          "$RUNNER_TEMP/carnopy-sdist/bin/python" -m pip install "$SDIST"
          "$RUNNER_TEMP/carnopy-sdist/bin/python" -m pip check
          "$RUNNER_TEMP/carnopy-sdist/bin/python" scripts/smoke_installed.py \
            --work-directory "$RUNNER_TEMP/sdist-smoke" \
            --expected-version "${GITHUB_REF_NAME#v}"
          "$RUNNER_TEMP/carnopy-sdist/bin/python" -m pip wheel \
            --no-deps \
            --wheel-dir "$RUNNER_TEMP/rebuilt-wheel" \
            "$SDIST"
      - name: Write release checksums
        run: >-
          uv run --locked python scripts/hash_distributions.py
          release/dist/*
          --output release/SHA256SUMS
      - name: Upload verified distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verified-distributions
          path: release/
          if-no-files-found: error

  publish-pypi:
    name: Approve and publish to PyPI
    needs:
      - inspect
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/carnopy
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verified-distributions
          path: release
      - name: Publish byte-identical distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: release/dist/

  smoke-pypi:
    name: Verify production PyPI release
    needs:
      - publish-pypi
    runs-on: ubuntu-latest
    steps:
      - name: Check out verification scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Download verified checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verified-distributions
          path: release
      - name: Download and verify PyPI files through its JSON API
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/verify_index_release.py \
            --index-base https://pypi.org/pypi \
            --project carnopy \
            --version "$VERSION" \
            --checksums release/SHA256SUMS \
            --output-directory "$RUNNER_TEMP/pypi-files"
      - name: Install and smoke-test verified PyPI wheel
        shell: bash
        run: |
          WHEEL="$(find "$RUNNER_TEMP/pypi-files" -maxdepth 1 -name '*.whl' -print -quit)"
          python -m venv "$RUNNER_TEMP/pypi-smoke-env"
          WHEEL_URI="$("$RUNNER_TEMP/pypi-smoke-env/bin/python" -c \
            'from pathlib import Path; import sys; print(Path(sys.argv[1]).resolve().as_uri())' \
            "$WHEEL")"
          "$RUNNER_TEMP/pypi-smoke-env/bin/python" -m pip install \
            --index-url https://pypi.org/simple/ \
            "carnopy[all] @ ${WHEEL_URI}"
          "$RUNNER_TEMP/pypi-smoke-env/bin/python" -m pip check
          "$RUNNER_TEMP/pypi-smoke-env/bin/python" scripts/smoke_installed.py \
            --work-directory "$RUNNER_TEMP/pypi-smoke" \
            --expected-version "${GITHUB_REF_NAME#v}" \
            --with-visualization \
            --with-ml-exports \
            --with-app
