# Saturation endpoints driven by exactly one temperature or pressure axis.
# Each coordinate emits saturated-liquid and saturated-vapor rows.
# Discover names with: carnopy fluids
# Discover output properties with: carnopy properties
schema_version: 1
backend: coolprop
mode: saturation_table
fluids:
  - Propane
grid:
  # stepspace is inclusive; stop must be reachable by an integral step count.
  temperature:
    kind: stepspace
    start: -30.0
    stop: 60.0
    step: 10.0
    unit: degC
properties:
  - specific_enthalpy
  - specific_entropy
  - mass_density
  - surface_tension
outputs:
  # Select one or both. Omission defaults to [csv, parquet].
  dataset_formats: [csv, parquet]
