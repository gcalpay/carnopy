# Pure-fluid states on a temperature-pressure Cartesian grid.
# Discover names with: carnopy fluids
# Discover output properties with: carnopy properties
schema_version: 1
backend: coolprop
mode: property_table
fluids:
  - Propane
  - Isobutane
grid:
  # linspace includes both endpoints.
  temperature:
    kind: linspace
    start: 20.0
    stop: 100.0
    num: 5
    unit: degC
  # linspace includes both endpoints with uniform pressure increments.
  pressure:
    kind: linspace
    start: 1.0
    stop: 20.0
    num: 5
    unit: bar
properties:
  - specific_enthalpy
  - specific_entropy
  - mass_density
  - isobaric_specific_heat_capacity
  - dynamic_viscosity
  - thermal_conductivity
outputs:
  # Select one or both. Omission defaults to [csv, parquet].
  dataset_formats: [csv, parquet]
